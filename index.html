<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>E-valua</title>

    <!-- Color de la barra del navegador (móvil) -->
    <meta name="theme-color" content="#4CAF50">

    <!-- Favicon (icono en pestaña) -->
    <link rel="icon" href="logo.png" type="image/png" alt="Logo E-valua">

    <!-- Para iPhone (modo app) -->
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Descripción (SEO básico) -->
    <meta name="description" content="E-valua - Plataforma inteligente de evaluación educativa">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #FFE4CA;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #2A1E0F;
            }
        }

        iframe {
            width: 100%;
            height: 100dvh;
            border: none;
            display: block;
        }

        /* Pantalla de carga */
        #loader {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            z-index: 10;
        }

        img {
            width: 60%;
            opacity: 0;
            transform: scale(0.8);
            animation: aparecer 1.2s ease forwards, flotar 2s ease-in-out infinite;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

    <script>
        let idPreview = "YacOpblP40nNjTkn29NH";

        function alCargarPagina() {
            setTimeout(() => {
                document.getElementById("frame").src = 
                    `https://preview.flutterflow.app/e-valua-c3jvup/${idPreview}`;

                document.getElementById("loader").style.display = "none";
            }, 4000);
        }
    </script>
</head>

<body onload="alCargarPagina()">

    <!-- Loader -->
    <div id="loader">
        <img src="logo.png" alt="Logo XXXX">
    </div>

    <!-- Página incrustada -->
    <iframe id="frame"></iframe>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
          apiKey: "",
          authDomain: "e-valua-db.firebaseapp.com",
          databaseURL: "https://e-valua-db-default-rtdb.firebaseio.com",
          projectId: "e-valua-db",
          storageBucket: "e-valua-db.firebasestorage.app",
          messagingSenderId: "635718448102",
          appId: "1:635718448102:web:aa5f2d57ebf350c9005c27",
          measurementId: "G-VENVD6ZQ4F"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Variables involucradas
        let pruebaIniciada = false;
        const idSeguimiento = "";
        const idEvaluacion = "";
        let ultimoEvento = {};

        // Leer datos del iframe para comprobar pruebaIniciada y obtener idSeguimiento
        window.addEventListener("message", (event) => {
            // Validar origen por seguridad (opcional pero recomendado)
            if (event.origin !== "https://preview.flutterflow.app") return;
            
            const { tipo, payload } = event.data || {};
            
            if (tipo === "TEST_INICIADO") {
                monitoreoActivo = true;
                idSeguimiento = payload?.idSeguimiento;
                idEvaluacion = payload?.idEvaluacion;
                
                document.documentElement.requestFullscreen();
                console.log("✅ Monitoreo activado:", idSeguimiento);
            }
            
            if (tipo === "TEST_FINALIZADO") {
                monitoreoActivo = false;

                document.exitFullscreen();
                console.log("🔚 Monitoreo desactivado");
            }
        });
        
        // Función para generar ID aleatorio
        function generarIdAleatorio(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const charactersLength = characters.length;
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * charactersLength));
            }
            return result;
        }
        
        // Función para registrar trampa
        async function enviarTrampa(tipo) {
            if (!monitoreoActivo) return;
            
            const ahora = Date.now();
            if (!ultimoEvento[tipo] || ahora - ultimoEvento[tipo] > 3000) {
              ultimoEvento[tipo] = ahora;
              try {
                await addDoc(collection(db, "EVALUACIONES", idEvaluacion, "REGISTROS-TRAMPA"), {
                  id: generarIdAleatorio(15),
                  fechaDeteccion: serverTimestamp(),
                  tipoTrampa: tipo,
                  idSeguimiento: idSeguimiento,
                });
              } catch (e) {
                console.error("Error enviando trampa:", e);
              }
            }
        }
        
        // Detectar cambio de pestaña
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            enviarTrampa("Cambio de pestaña");
          }
        });
        
        // Detectar pérdida de foco
        window.addEventListener("blur", () => {
          enviarTrampa("Pérdida de foco");
        });

        // Detectar cambio de pantalla completa
        document.addEventListener("fullscreenchange", () => {
          if (!document.fullscreenElement) {
            enviarTrampa("Salió de pantalla completa");
            document.documentElement.requestFullscreen().catch(() => {});
          }
        });
        
        // Detectar copia de contenido
        document.addEventListener("copy", () => enviarTrampa("Contenido de la prueba copiado"));
        
        // Bloqueo de click derecho
        document.addEventListener("contextmenu", e => e.preventDefault());
    </script>
</body>

</html>
