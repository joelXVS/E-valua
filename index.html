<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Examen JSON — Proyecto</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- libs para PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div id="app" class="container">
    <header class="header">
      <h1>📝 Plataforma de Exámenes</h1>
      <p class="sub">Introduce tu nombre, grupo y código de aplicación para comenzar.</p>
    </header>

    <main id="main">
      <!-- pantalla de ingreso -->
      <section id="start-screen" class="card">
        <label class="field">
          <span>Nombre del estudiante</span>
          <input id="studentName" type="text" placeholder="Ej: Juan Pérez" />
        </label>

        <label class="field">
          <span>Grupo</span>
          <input id="studentGroup" type="text" placeholder="Ej: Septimo 1" />
        </label>

        <label class="field">
          <span>Código de aplicación</span>
          <input id="applyCode" type="text" placeholder="Ej: ABC123" />
        </label>

        <div class="row gap">
          <button id="btnContinue" class="btn primary">Continuar</button>
          <button id="btnLoadTests" class="btn">Ver pruebas disponibles</button>
        </div>

        <div id="availableTests" class="available-tests"></div>
      </section>

      <!-- pantalla de examen -->
      <section id="exam-screen" class="hidden">
        <div class="exam-header">
          <h2 id="testTitle"></h2>
          <div class="meta">
            <div>Estudiante: <strong id="metaName"></strong></div>
            <div>Grupo: <strong id="metaGroup"></strong></div>
            <div>Tiempo: <strong id="timer">00:00</strong></div>
          </div>
        </div>

        <div id="questionContainer" class="card question-card"></div>

        <div class="row nav-buttons">
          <button id="prevBtn" class="btn">← Anterior</button>
          <button id="nextBtn" class="btn">Siguiente →</button>
        </div>

        <div class="row end-buttons">
          <button id="finishBtn" class="btn danger">Terminar prueba</button>
        </div>
      </section>

      <!-- resultado -->
      <section id="result-screen" class="hidden card">
        <h2>Resultados</h2>
        <div id="resultSummary"></div>
        <div id="detailedAnswers"></div>
        <div class="row gap">
          <button id="downloadBtn" class="btn">Descargar resultado JSON</button>
          <button id="downloadPdfBtn" class="btn primary">Generar PDF del resultado</button>
          <button id="restartBtn" class="btn">Volver al inicio</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Diseño responsive • Funciona en móvil y escritorio</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
