<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>E-valua</title>

    <!-- Color de la barra del navegador (móvil) -->
    <meta name="theme-color" content="#4CAF50">

    <!-- Favicon (icono en pestaña) -->
    <link rel="icon" href="logo.png" type="image/png" alt="Logo E-valua">

    <!-- Para iPhone (modo app) -->
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Descripción (SEO básico) -->
    <meta name="description" content="E-valua - Plataforma inteligente de evaluación educativa">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #f5f5f5;
        }

        iframe {
            width: 100%;
            height: 90%;
            border: none;
        }

        /* Pantalla de carga */
        #loader {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            z-index: 10;
        }

        img {
            width: 60%;
            opacity: 0;
            transform: scale(0.8);
            animation: aparecer 1.2s ease forwards, flotar 2s ease-in-out infinite;
        }

        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

    <script>
        let idPreview = "erYwiuGCmcvoGtdPwSo5";

        function alCargarPagina() {
            setTimeout(() => {
                document.getElementById("frame").src = 
                    `https://preview.flutterflow.app/e-valua-c3jvup/${idPreview}`;

                document.getElementById("loader").style.display = "none";
            }, 4000);
        }
    </script>
</head>

<body onload="alCargarPagina()">

    <!-- Loader -->
    <div id="loader">
        <img src="logo.png" alt="Logo XXXX">
    </div>

    <!-- Página incrustada -->
    <iframe id="frame"></iframe>

</body>
</html>
