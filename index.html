<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>E-valua - Redirigir</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        img {
            width: 200px;
            opacity: 0;
            transform: scale(0.8);
            animation: aparecer 1.2s ease forwards, flotar 2s ease-in-out infinite;
        }

        /* Animación de entrada */
        @keyframes aparecer {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Animación flotante */
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

    <script>
        let idPreview = "TCGnUbp79jm4seRXi8zY";

        function alCargarPagina() {
            setTimeout(() => {
                window.location.href = `https://preview.flutterflow.app/e-valua-c3jvup/${idPreview}`;
            }, 2000);
        }
    </script>
</head>

<body onload="alCargarPagina()">
    <img src="logo.png" alt="Logo E-valua">
</body>
</html>
