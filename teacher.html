<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>E-valua para Docentes</title>
  <link rel="stylesheet" href="common-styles.css" />
</head>
<body>
  <div class="container">
    <header class="header card">
      <h1>E-valua — Panel de Docentes</h1>
      <p class="sub">Inicia sesión, crea y administra pruebas, y exporta resultados.</p>
    </header>

    <main>
      <!-- Login -->
      <section id="login" class="card">
        <label class="field"><span>Usuario:</span><input id="teacherUser" type="text" /></label>
        <label class="field"><span>Contraseña:</span><input id="teacherPass" type="password" /></label>
        <div class="row gap">
          <button id="btnLogin" class="btn primary">Entrar</button>
        </div>
        <div id="loginMsg" class="small"></div>
      </section>

      <!-- Panel -->
      <section id="panel" class="card hidden">
        <div class="row space">
          <div>
            <h3 id="welcome"></h3>
            <p class="small">Administración de pruebas y resultados</p>
          </div>
          <div class="row gap">
            <button id="btnNewTest" class="btn">Crear prueba</button>
            <button id="btnExportAll" class="btn">Exportar todos resultados (PDF)</button>
            <button id="btnSaveJSON" class="btn">Guardar tests en localStorage</button>
            <button id="btnLogout" class="btn">Cerrar sesión</button>
          </div>
        </div>

        <hr/>

        <!-- Lista pruebas -->
        <div>
          <h4>Pruebas disponibles</h4>
          <div id="testsList"></div>
        </div>

        <hr/>

        <!-- Editor prueba -->
        <div id="testEditor" class="hidden">
          <h4>Editor de prueba</h4>
          <label class="field"><span>Nombre de la prueba</span><input id="editName" type="text" /></label>
          <label class="field"><span>Duración (min)</span><input id="editTime" type="number" min="1" /></label>
          <label class="field"><span>Puntos por acierto</span><input id="editPtsOk" type="number" min="0" /></label>
          <label class="field"><span>Puntos por error</span><input id="editPtsBad" type="number" /></label>
          <label class="field"><span>Disponible desde (HH:MM)</span><input id="editFrom" type="text" placeholder="08:00" /></label>
          <label class="field"><span>Disponible hasta (HH:MM)</span><input id="editTo" type="text" placeholder="23:59" /></label>
          <label class="field"><span>Mostrar resultados a estudiantes</span><select id="editShowRes"><option value="true">Sí</option><option value="false">No</option></select></label>
          <label class="field"><span>Mostrar respuestas correctas</span><select id="editShowCorrect"><option value="true">Sí</option><option value="false">No</option></select></label>

          <div class="row gap">
            <button id="btnAddQuestion" class="btn">Agregar pregunta</button>
            <button id="btnSaveTest" class="btn primary">Guardar prueba</button>
            <button id="btnCancelEdit" class="btn">Cancelar</button>
          </div>

          <div id="questionsEditor"></div>
        </div>

        <hr/>

        <!-- Resultados -->
        <div>
          <h4>Resultados presentados</h4>
          <div class="row gap">
            <button id="btnLoadResultsFromLS" class="btn">Cargar resultados (localStorage)</button>
            <button id="btnUploadResultsFile" class="btn">Cargar results.json</button>
          </div>
          <div id="resultsList"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- jsPDF CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="teacher-app.js"></script>
</body>
</html>
