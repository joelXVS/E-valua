<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>E-valua para Estudiantes</title>
  <link rel="stylesheet" href="common-styles.css" />
</head>
<body>
  <div class="container">
    <header class="header card">
      <h1>📝 E-valua para Estudiantes</h1>
      <p class="sub">Ingresa tu nombre, grupo y código.<br>La prueba se auto-envía si cambias de pestaña.</p>
    </header>

    <main>
      <section id="start" class="card">
        <label class="field"><span>Nombre:</span><input id="studentName" type="text" placeholder="Ej: Juan Pérez" /></label>
        <label class="field"><span>Grupo Literal:</span><input id="studentGroup" type="text" placeholder="Ej: Septimo 1" /></label>

        <label class="field"><span>Grupo (selecciona tu grupo para asegurarse de que es el correcto):</span>
          <select id="gradeSelect"><option value="">-- Seleccionar curso --</option></select>
        </label>

        <label class="field"><span>Código de aplicación de prueba:</span><input id="applyCode" type="text" placeholder="Ej: ABC123" /></label>

        <div class="row gap">
          <button id="btnContinue" class="btn primary">Continuar</button>
        </div>

        <div id="available" class="available-tests small"></div>
      </section>

      <section id="exam" class="card hidden">
        <div class="exam-header">
          <h2 id="testTitle"></h2>
          <div class="meta">
            <div>Estudiante: <strong id="metaName"></strong></div>
            <div>Grupo: <strong id="metaGroup"></strong></div>
            <div>Grado: <strong id="metaGrade"></strong></div>
            <div>Tiempo: <strong id="timer">00:00</strong></div>
          </div>
        </div>

        <div id="questionContainer" class="question-card"></div>

        <div class="row nav-buttons">
          <button id="prevBtn" class="btn">← Anterior</button>
          <button id="nextBtn" class="btn">Siguiente →</button>
        </div>

        <div class="row end-buttons">
          <button id="finishBtn" class="btn danger">Terminar prueba</button>
        </div>
      </section>

      <section id="result" class="card hidden">
        <h2>Resultados</h2>
        <div id="resultSummary"></div>
        <div id="detailedAnswers"></div>
        <div class="row gap">
          <button id="downloadBtn" class="btn">Descargar JSON</button>
          <button id="downloadPdfBtn" class="btn">Exportar PDF</button>
          <button id="backBtn" class="btn">Volver</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="small">E-valua fue creado por Joel Valencia</p>
    </footer>
  </div>

  <!-- jsPDF CDN para exportar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="student-app.js"></script>
</body>
</html>
